name: Test and Deploy Frontend

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Profile
        id: set-env
        run: |
          if [ "${{ github.base_ref }}" = "dev" ] || [ "${{ github.ref_name }}" = "dev" ]; then
            echo "profile=development" >> $GITHUB_OUTPUT
          else
            echo "profile=production" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          build-args: |
            APP_ENV=${{ steps.set-env.outputs.profile }}
          tags: frontend-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- DEPLOYMENT STEP ---
      # This only triggers on a direct PUSH or MERGE (not on raw Pull Requests)
      
      - name: Trigger Render Dev Deployment
        if: github.event_name == 'push' && github.ref_name == 'dev'
        run: |
          echo "Deploying to Render Development Environment..."
          curl -X POST "${{ secrets.RENDER_DEV_FRONTEND_DEPLOY_HOOK }}"

      - name: Trigger Render Prod Deployment
        if: github.event_name == 'push' && github.ref_name == 'master'
        run: |
          echo "Deploying to Render Production Environment..."
          curl -X POST "${{ secrets.RENDER_PROD_FRONTEND_DEPLOY_HOOK }}"